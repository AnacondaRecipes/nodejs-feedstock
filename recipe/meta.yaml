{% set version = "23.11.1" %}
# {% set version = "24.10.0" %}

package:
  name: nodejs
  version: {{ version }}

source:
  # checksums from https://nodejs.org/dist/vX.Y.Z/SHASUMS256.txt.asc
  url: https://nodejs.org/dist/v{{ version }}/node-v{{ version }}.tar.gz  # [unix]
  sha256: 75509306732090bfa99b004d097909315f7789badb4a495e82b5f17b6329247a  # [unix]
  url: https://nodejs.org/dist/v{{ version }}/node-v{{ version }}-win-x64.zip  # [win]
  sha256: d22640060e1911efaede4ecc5820f94b613bc196868289cd34f56d46e4709b71  # [win]

  # url: https://nodejs.org/dist/v{{ version }}/node-v{{ version }}.tar.gz  # [unix]
  # sha256: fb9aa1938aa8d7b53e437184e4c5b26823db0afb5ac1cbfe6559176531e900e6  # [unix]
  # url: https://nodejs.org/dist/v{{ version }}/node-v{{ version }}-win-x64.zip  # [win]
  # sha256: adc1a2d5ca79c92e94f3a58c3ec0efa76bdb488769ba4d4b50990e4c84896060  # [win]

  patches:   # [not win]
    - patches/0001-fix-min-macosx-sdk-ver.patch                   # [not win]
    # - patches/0001-fix-min-macosx-sdk-ver-for-nodejs-24.10.0.patch  # [not win]
    - patches/0002-include-obj-name-in-shared-intermediate.patch    # [not win]
    - patches/0003-Forward-ceilf-floorf.patch                       # [not win]

build:
  number: 0
  # Prefix replacement breaks in the binary embedded configurations.
  detect_binary_files_with_prefix: false

requirements:
  build:
    - {{ stdlib('c') }}      # [not win]
    - {{ compiler('c') }}    # [not win]
    - {{ compiler('cxx') }}  # [not win]
    - sysroot_linux-64 {{ sysroot_linux_64 }}            # [linux64]
    - sysroot_linux-aarch64 {{ sysroot_linux_aarch64 }}  # [aarch64]
    - python                 # [not win]
    - ninja                  # [not win]
    - pkg-config             # [not win]
    - patch                  # [not win]

    # ---- toolchain для Linux (clang + libc++) ----
    - clang 20.1.8            # [linux]
    - clangxx 20.1.8          # [linux]
    - lld 20.1.8              # [linux]
    - libllvm20 20.1.8        # [linux]
    - llvm-tools 20.1.8       # [linux]
    - libcxx 20.1.8           # [linux]
    - libcxx-devel 20.1.8     # [linux]


  host:
    - icu {{ icu }}
    - openssl {{ openssl }}  # [not win]
    - zlib {{ zlib }}        # [not win]
  run:
    - {{ pin_compatible('icu') }}
    - openssl                # [not win]
    - zlib                   # [not win]

test:
  requires:
    - nodejs
  commands:
    - node -h
    - node -v
    - node -p "process.versions.v8 && process.version"
    - node -p "!!process.versions.openssl"           # test OpenSSL
    - node -p "process.config.variables.node_target_type || 'executable'"

    - npm version
    - npm install -h
    - npm config get prefix -g

    # test if node realy use JS
    - test $(echo "console.log(1 + 3)" | node) == 4  # [not win]
    # ===== ICU (Intl) =====
    - node -e "require('assert').ok(new Intl.DateTimeFormat('en').format(0))"
    # ===== zlib (compress) =====
    - node -e "const z=require('zlib');z.gzip('abc',(e,b)=>process.exit(e||!b||!b.length?1:0));"
    # ===== crypto (hash) =====
    - node -e "require('crypto').createHash('sha256').update('test').digest('hex') && process.exit(0)"

    - NMV=$(node -p "process.versions.modules") && test -f "$PREFIX/lib/libnode.${NMV}.dylib"  # [osx]
    - NMV=$(node -p "process.versions.modules") && test -f "$PREFIX/lib/libnode.so.${NMV}"     # [linux]

about:
  home: https://nodejs.org/
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Node.js is an open-source, cross-platform JavaScript runtime environment.
  description: |
    Node.js is an open-source, cross-platform JavaScript runtime environment.
    As an asynchronous event-driven JavaScript runtime, Node.js is designed to
    build scalable network applications.
  doc_url: https://nodejs.org/en/docs/
  dev_url: https://github.com/nodejs/node

extra:
  recipe-maintainers:
    - minrk
    - msarahan
    - pelson
    - blink1073
    - xhochy
    - katietz
